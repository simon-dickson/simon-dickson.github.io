<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Useful Links — AI Knowledge Base</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080f;
    --surface: #0e0e1a;
    --surface2: #13131f;
    --border: #1c1c2e;
    --border2: #252538;
    --accent1: #d4ff47;
    --accent2: #47c8ff;
    --accent3: #ff4f6a;
    --accent4: #b47fff;
    --accent5: #ffaa47;
    --accent6: #4de0c0;
    --text: #e4e4f0;
    --muted: #4a4a68;
    --muted2: #7878a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.65;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 10% 0%, rgba(71,200,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(180,127,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 50% 50%, rgba(77,224,192,0.02) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 40px 100px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  header {
    margin-bottom: 64px;
    animation: fadeUp 0.7s ease both;
  }

  .back-link {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--muted2);
    text-transform: uppercase;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent2); }
  .back-link::before { content: '←'; font-size: 12px; }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .eyebrow::after {
    content: '';
    display: block;
    height: 1px;
    width: 60px;
    background: var(--accent2);
    opacity: 0.4;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 9vw, 110px);
    line-height: 0.85;
    letter-spacing: 0.02em;
    margin-bottom: 28px;
  }

  h1 .line1 { display: block; color: var(--text); }
  h1 .line2 { display: block; color: var(--accent2); }

  .header-bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 24px;
    padding-top: 32px;
    border-top: 1px solid var(--border2);
    margin-top: 32px;
  }

  .header-desc {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted2);
    max-width: 420px;
    line-height: 1.9;
  }

  .header-desc strong { color: var(--accent2); font-weight: 400; }

  .header-stats {
    display: flex;
    gap: 32px;
  }

  .stat { text-align: right; }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    line-height: 1;
    color: var(--accent2);
    display: block;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── SECTION LABEL ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border2);
  }

  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── CATEGORY FILTERS ── */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.2s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 5px 12px;
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(71,200,255,0.05);
  }

  /* ── LINKS GRID ── */
  .links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2px;
    animation: fadeUp 0.6s 0.3s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .link-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px 26px 22px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, background 0.25s, transform 0.25s;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .link-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--cat-color, var(--accent2));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s ease;
  }

  .link-card:hover {
    border-color: var(--border2);
    background: var(--surface2);
    transform: translateY(-2px);
  }
  .link-card:hover::before { transform: scaleX(1); }

  .link-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 12px;
  }

  .link-category {
    font-family: 'DM Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cat-color, var(--accent2));
    background: rgba(71,200,255,0.06);
    border: 1px solid currentColor;
    padding: 3px 8px;
    opacity: 0.85;
    white-space: nowrap;
  }

  .link-open-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.2s;
    text-decoration: none;
    opacity: 0;
    transition: opacity 0.2s, border-color 0.2s, color 0.2s;
  }
  .link-card:hover .link-open-btn { opacity: 1; }
  .link-open-btn:hover { border-color: var(--muted2); color: var(--text); }

  .link-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .link-desc {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    line-height: 1.75;
    margin-bottom: 18px;
    flex: 1;
  }

  .link-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .link-url {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    color: var(--muted);
    max-width: 70%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .link-open {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    color: var(--cat-color, var(--accent2));
    text-decoration: none;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 5px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .link-open:hover { opacity: 1; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 40px;
    border: 1px dashed var(--border2);
    grid-column: 1 / -1;
  }

  .empty-icon {
    font-size: 32px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .empty-desc {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── FOOTER ── */
  footer {
    margin-top: 80px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .footer-left {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
  }

  .footer-right {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .footer-right span { color: var(--accent2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .container { padding: 40px 24px 80px; }
    .links-grid { grid-template-columns: 1fr; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header>
    <a href="index.html" class="back-link">Back to Knowledge Base</a>
    <div class="eyebrow">AI Knowledge Base</div>
    <h1>
      <span class="line1">Useful</span>
      <span class="line2">Links</span>
    </h1>
    <div class="header-bottom">
      <div class="header-desc">
        A curated collection of <strong>tools, resources & references</strong> — add new entries directly in the HTML source below.
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="stat-num" id="link-count">00</span>
          <span class="stat-label">Links</span>
        </div>
      </div>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filters" id="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="General">General</button>
    <button class="filter-btn" data-filter="Tools">Tools</button>
    <button class="filter-btn" data-filter="Documentation">Documentation</button>
    <button class="filter-btn" data-filter="Research">Research</button>
    <button class="filter-btn" data-filter="Learning">Learning</button>
    <button class="filter-btn" data-filter="Community">Community</button>
  </div>

  <!-- SECTION HEADER -->
  <div class="section-header">
    <span class="section-label">Links</span>
    <div class="section-line"></div>
    <span class="section-count" id="visible-count">00 total</span>
  </div>

  <!-- LINKS GRID -->
  <div class="links-grid" id="links-grid"></div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">AI KNOWLEDGE BASE — USEFUL LINKS</div>
    <div class="footer-right">Hosted on <span>GitHub Pages</span></div>
  </footer>

</div>

<script>
  // ────────────────────────────────────────────────────────────────
  //  LINKS DATA
  //  To add a new link, copy one of the objects below and paste it
  //  at the end of the array (before the closing bracket).
  //  Fields:
  //    title    – display name  (required)
  //    url      – full URL      (required)
  //    desc     – short blurb   (optional, leave as "" to omit)
  //    category – must be one of: General | Tools | Documentation |
  //               Research | Learning | Community
  // ────────────────────────────────────────────────────────────────
  const LINKS = [

    {
      title:    "Anthropic Interactive Prompt Engineering Tutorial",
      url:      "https://github.com/anthropics/prompt-eng-interactive-tutorial",
      desc:     "An interactive tutorial on prompt engineering",
      category: "Learning"
    },

    {
      title:    "Python Institute",
      url:      "https://pythoninstitute.org",
      desc:     "Python Programming, Learning & Certification",
      category: "Learning"
    },

    {
      title:    "AI Glossary",
      url:      "https://platform.claude.com/docs/en/about-claude/glossary",
      desc:     "Glossary of AI Concepts",
      category: "Documentation"
    },

    {
      title:    "Complete Guide to Building Skills for Claude",
      url:      "https://resources.anthropic.com/hubfs/The-Complete-Guide-to-Building-Skill-for-Claude.pdf",
      desc:     "eBook from Anthropic with a guide on building skills for Claude",
      category: "Documentation"
    },

    // ── ADD NEW LINKS BELOW THIS LINE ───────────────────────────
    // {
    //   title:    "Example Link Title",
    //   url:      "https://example.com",
    //   desc:     "A short description of what this link is for",
    //   category: "General"
    // },

  ];
  // ────────────────────────────────────────────────────────────────

  const CAT_COLORS = {
    General:       '#47c8ff',
    Tools:         '#d4ff47',
    Documentation: '#b47fff',
    Research:      '#ff4f6a',
    Learning:      '#ffaa47',
    Community:     '#4de0c0',
  };

  let activeFilter = 'all';

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function render() {
    const grid = document.getElementById('links-grid');
    const filtered = activeFilter === 'all'
      ? LINKS
      : LINKS.filter(l => l.category === activeFilter);

    document.getElementById('link-count').textContent = String(LINKS.length).padStart(2, '0');
    document.getElementById('visible-count').textContent = `${String(filtered.length).padStart(2, '0')} total`;

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⬡</div>
          <div class="empty-title">No Matches</div>
          <div class="empty-desc">Try selecting a different category filter</div>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(link => {
      const color = CAT_COLORS[link.category] || CAT_COLORS.General;
      const displayUrl = link.url.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '');
      return `
        <div class="link-card" style="--cat-color: ${color};">
          <div class="link-card-top">
            <span class="link-category">${escHtml(link.category)}</span>
            <a class="link-open-btn" href="${escHtml(link.url)}" target="_blank" rel="noopener" title="Open link">↗</a>
          </div>
          <div class="link-title">${escHtml(link.title)}</div>
          ${link.desc ? `<div class="link-desc">${escHtml(link.desc)}</div>` : '<div class="link-desc" style="flex:1"></div>'}
          <div class="link-footer">
            <span class="link-url">${escHtml(displayUrl)}</span>
            <a class="link-open" href="${escHtml(link.url)}" target="_blank" rel="noopener">Open →</a>
          </div>
        </div>`;
    }).join('');
  }

  // ── Filter bar ──
  document.getElementById('filter-bar').addEventListener('click', function(e) {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });

  // ── Init ──
  render();
</script>
</body>
</html>
